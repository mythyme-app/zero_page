<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mythyme</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    @keyframes fadeIn {0%{opacity:0;transform:scale(0.95)}100%{opacity:1;transform:scale(1)}}
    @keyframes pulse {0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}
    html,body{
      height:100%;margin:0;background:#000;
      font-family:'Raleway',sans-serif;
      font-weight:300;
      display:flex;justify-content:center;
      align-items:center;text-align:center;
      flex-direction:column;color:#f5f5f5;
    }
    .hero{
      transform:translateY(-12vh);
    }
    .logo{
      max-width:300px;width:60%;
      display:block;margin:0 auto;
      animation:fadeIn 2s ease-out,pulse 5s ease-in-out infinite;
    }
    .mythyme{
      margin-top:20px;font-size:1.5rem;
      font-weight:600;
      letter-spacing:0.025em;
      animation:fadeIn 2s ease-out;
    }
    .tagline{
      margin-top:8px;
      font-size:0.95rem;
      letter-spacing:0.045em;
      color:#f5f5f5;
      font-weight:400;
      line-height:1.45;
      animation:fadeIn 2.4s ease-out;
    }
    .mythyme a{
      color:#f5f5f5;
      text-decoration:none;
    }
    .mythyme a:hover{
      text-decoration:underline;
    }
    .linkedin-link{
      position:fixed;
      left:50%;
      bottom:32px;
      transform:translateX(-50%);
      display:inline-flex;
      align-items:center;
      justify-content:center;
      color:#f5f5f5;
      opacity:0.62;
      transition:opacity 0.2s ease,transform 0.2s ease;
      animation:fadeIn 2.8s ease-out;
    }
    .linkedin-link:hover{
      opacity:0.9;
      transform:translateX(-50%) scale(1.04);
    }
    .linkedin-link svg{
      width:18px;
      height:18px;
      display:block;
      fill:currentColor;
    }
    @media screen and (max-width:600px){
      .logo{width:80%;max-width:200px;}
      .mythyme{font-size:1.2rem;}
      .tagline{font-size:0.82rem;padding:0 24px;}
      .linkedin-link{bottom:24px;}
    }
  </style>
</head>
<body>
  <div class="hero">
    <img src="logo.png" alt="Logo" class="logo">
    <div class="mythyme">
      <a href="https://www.linkedin.com/company/mythyme-app/?viewAsMember=true" target="_blank">mythyme.app</a>
    </div>
    <div class="tagline">We make daily life machine-readable</div>
  </div>
  <a class="linkedin-link" href="https://www.linkedin.com/company/mythyme-app/?viewAsMember=true" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M4.98 3.5a2.48 2.48 0 1 1 0 4.96 2.48 2.48 0 0 1 0-4.96ZM3 9h3.96v12H3V9Zm7.02 0H13.8v1.64h.05c.53-1 1.83-2.06 3.77-2.06 4.03 0 4.78 2.5 4.78 5.75V21h-3.96v-5.9c0-1.4-.03-3.2-2.05-3.2-2.05 0-2.36 1.52-2.36 3.1V21h-4V9Z"/>
    </svg>
  </a>
</body>
</html>
